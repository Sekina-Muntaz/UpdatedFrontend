# Generated by Containerization Assist - AI powered configuration
# Kubernetes Deployment for DSS Frontend Vue.js Application

apiVersion: apps/v1
kind: Deployment
metadata:
  name: dss-frontend-v2
  namespace: default
  labels:
    app: dss-frontend-v2
    version: v1
    managed-by: kubernetes
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: dss-frontend-v2
  template:
    metadata:
      labels:
        app: dss-frontend-v2
        version: v1
      annotations:
        prometheus.io/scrape: "false"
    spec:
      # Security context for pod
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      
      # Pod anti-affinity for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - dss-frontend-v2
                topologyKey: kubernetes.io/hostname
      
      containers:
        - name: dss-frontend
          image: dss-frontend-v2:latest
          imagePullPolicy: Always
          
          # Security context for container
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          
          # Environment variables from ConfigMap
          envFrom:
            - configMapRef:
                name: dss-frontend-config
          
          # Resource requests and limits
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          
          # Liveness probe - restart if not responding
          livenessProbe:
            httpGet:
              path: /
              port: http
              httpHeaders:
                - name: User-Agent
                  value: Kubernetes-Health-Check
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          
          # Readiness probe - traffic only when ready
          readinessProbe:
            httpGet:
              path: /
              port: http
              httpHeaders:
                - name: User-Agent
                  value: Kubernetes-Health-Check
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 2
          
          # Volume mounts
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      
      # Volumes
      volumes:
        - name: tmp
          emptyDir: {}
      
      # Service account and RBAC
      serviceAccountName: dss-frontend-v2
      
      # Restart policy
      restartPolicy: Always
      
      # Termination grace period
      terminationGracePeriodSeconds: 30
