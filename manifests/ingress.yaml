# Kubernetes Ingress for DSS Frontend Vue.js Application
# Configure ingress based on your cluster setup (nginx-ingress, traefik, etc.)

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dss-frontend-v2
  namespace: default
  labels:
    app: dss-frontend-v2
    version: v1
  annotations:
    # Nginx Ingress Controller annotations
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    
    # CORS configuration
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://example.com"
    
    # Cache configuration
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "Cache-Control: public, max-age=3600";
    
    # Cert-manager for SSL/TLS
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

spec:
  ingressClassName: nginx
  
  tls:
    - hosts:
        - dss-frontend.example.com
      secretName: dss-frontend-tls
  
  rules:
    - host: dss-frontend.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dss-frontend-v2
                port:
                  number: 80
