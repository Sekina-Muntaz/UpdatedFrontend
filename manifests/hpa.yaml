# Generated by Containerization Assist - AI powered configuration
# Kubernetes HorizontalPodAutoscaler for DSS Frontend Vue.js Application

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dss-frontend-v2
  namespace: default
  labels:
    app: dss-frontend-v2
    version: v1
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dss-frontend-v2
  
  minReplicas: 3
  maxReplicas: 10
  
  metrics:
    # Scale based on CPU usage
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    
    # Scale based on memory usage
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
